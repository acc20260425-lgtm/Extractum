[package]
name = "extractum"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

[lib]
name = "extractum_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
grammers-client = { git = "https://github.com/Lonami/grammers", branch = "master", default-features = false }
grammers-session = { git = "https://github.com/Lonami/grammers", branch = "master", default-features = false, features = ["serde"] }
grammers-mtsender = { git = "https://github.com/Lonami/grammers", branch = "master" }
zstd = "0.13"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
